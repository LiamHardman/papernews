services:
  papernews:
    build: .
    image: papernews:latest
    container_name: papernews
    restart: unless-stopped
    environment:
      # Set this in a .env file or your shell. claude -p needs it.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Override the default 4h ingest cycle (in seconds) if you want.
      - INGEST_INTERVAL_SECONDS=${INGEST_INTERVAL_SECONDS:-14400}
      - PAPERNEWS_WORKERS=${PAPERNEWS_WORKERS:-8}
    volumes:
      # Persistent data (state.db + cached PDFs/PNGs). Survives restarts and
      # `docker compose down`. Use `docker compose down -v` to wipe.
      - ./data:/data
      # Hot-reload sources without rebuilding the image.
      - ./sources.toml:/app/sources.toml:ro
    ports:
      - "8000:8000"
